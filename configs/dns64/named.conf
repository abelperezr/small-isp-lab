////////////////////////////////////////////////////////////////////////////////
// DNS64 Server Configuration for NAT64 Lab
// NAT64 Prefix: 64:ff9b::/96 (Well-Known Prefix RFC 6052)
////////////////////////////////////////////////////////////////////////////////

options {
    directory "/var/cache/bind";

    listen-on-v6 { any; };
    listen-on { any; };

    allow-query { any; };
    allow-recursion { any; };

    forward only;
    forwarders {
        8.8.8.8;
        8.8.4.4;
    };

    // DNS64 Configuration
    dns64 64:ff9b::/96 {
        clients { any; };
        mapped { any; };
        exclude { any; };
        recursive-only yes;
        break-dnssec yes;
        suffix ::;
    };

    dnssec-validation no;
    querylog yes;
    version "DNS64 Server";
};

// Logging - SIN categoría 'dns64' (no existe en BIND 9)
logging {
    channel stderr_log {
        stderr;
        severity info;
        print-time yes;
    };
    category default { stderr_log; };
    category queries { stderr_log; };
};



zone "localhost" {
    type master;
    file "/etc/bind/db.local";
};

zone "127.in-addr.arpa" {
    type master;
    file "/etc/bind/db.127";
};

zone "0.in-addr.arpa" {
    type master;
    file "/etc/bind/db.0";
};

zone "255.in-addr.arpa" {
    type master;
    file "/etc/bind/db.255";
};
