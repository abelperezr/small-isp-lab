---
# Ping all hosts defined in the Ansible inventory.

- name: Ping all lab nodes
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Ping management IP
      ansible.builtin.command:
        cmd: "ping -c 1 -W 2 {{ hostvars[item].ansible_host }}"
      loop: "{{ groups['all'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      register: ping_result
      ignore_errors: true
      changed_when: false

    - name: Show result
      ansible.builtin.debug:
        msg: >-
          {{ item.item }} ({{ hostvars[item.item].ansible_host }}):
          {{ 'UP' if item.rc == 0 else 'DOWN' }}
      loop: "{{ ping_result.results }}"
